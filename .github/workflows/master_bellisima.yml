name: CI/CD de Node.js a Azure App Service

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Usar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    
    - name: Instalar dependencias
      working-directory: Bellisima-SALON-SPA/backend
      run: npm ci
    
    - name: Construir proyecto
      working-directory: Bellisima-SALON-SPA/backend
      run: npm run build
    
    - name: Ejecutar pruebas
      working-directory: Bellisima-SALON-SPA/backend
      run: npm test
    
    - name: Comprimir artefacto para despliegue
      working-directory: Bellisima-SALON-SPA/backend
      run: zip -r ../../release.zip .

    - name: Subir artefacto para trabajo de despliegue
      uses: actions/upload-artifact@v3
      with:
        name: node-app
        path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Descargar artefacto
      uses: actions/download-artifact@v3
      with:
        name: node-app
    
    - name: Login to Azure
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_9EE7EAFE80A4400498B55B4AA513E04B }}
        tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A647789121D346E98A63218075ECD192 }}
        subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E1CD65E8443A404CA9D25CA36D5CBD4F }}
    
    - name: 'Desplegar en Azure Web App'
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'bellisima'
        slot-name: 'Production'
        package: release.zip
